{% extends "base.html" %}

{% block content %}
<div class="max-w-6xl">
    <div class="mb-8 border-b border-gray-200 dark:border-gray-700 pb-4">
        <h1 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-white">Content Domain</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-2">Manage ideas, review backlog, and schedule operations.</p>
    </div>

    <!-- Add Form -->
    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 mb-8">
        <h2 class="text-lg font-bold mb-4 text-gray-900 dark:text-white">Draft New Idea</h2>
        <form action="/add" method="POST" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-1">
                    <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase mb-1">Topic</label>
                    <input type="text" name="topic" placeholder="e.g. M8 Release" required class="w-full border border-gray-300 dark:border-gray-600 p-2.5 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" minlength="3">
                </div>
                <div class="md:col-span-1">
                    <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase mb-1">Type</label>
                    <select name="type" required class="w-full border border-gray-300 dark:border-gray-600 p-2.5 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        <option value="RefLink">RefLink</option>
                        <option value="SelfPromotion">SelfPromotion</option>
                        <option value="Social">Social</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase mb-1">Reference URL</label>
                    <input type="url" name="link_url" placeholder="https://..." class="w-full border border-gray-300 dark:border-gray-600 p-2.5 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase mb-1">Source Idea (Instructions for AI)</label>
                <textarea name="source_idea" placeholder="Write a long announcement about..." required class="w-full border border-gray-300 dark:border-gray-600 p-2.5 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" minlength="5" rows="3"></textarea>
            </div>
            
            <div class="flex flex-col md:flex-row md:items-end justify-between space-y-4 md:space-y-0 md:space-x-4 border-t border-gray-100 dark:border-gray-700 pt-4">
                <div class="flex gap-4 flex-1">
                    <div class="flex-1">
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase mb-1">Tags (csv)</label>
                        <input type="text" name="hashtags" placeholder="#tech, #ai" class="w-full border border-gray-300 dark:border-gray-600 p-2 rounded-lg text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                </div>

                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-bold shadow-sm transition-colors h-[42px]">Add to Backlog</button>
            </div>
        </form>
    </div>

    <!-- Backlog Table -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
        <table class="w-full text-left text-sm text-gray-900 dark:text-gray-300">
            <thead class="bg-gray-50 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-700">
                <tr>
                    <th class="p-4 font-semibold uppercase text-xs tracking-wider">Context & Variables</th>
                    <th class="p-4 font-semibold uppercase text-xs tracking-wider">Source Idea</th>
                    <th class="p-4 font-semibold uppercase text-xs tracking-wider">Status</th>
                    <th class="p-4 font-semibold uppercase text-xs tracking-wider w-32">Action</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                {% for item in items %}
                    {% include 'partials/content_row.html' %}
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
