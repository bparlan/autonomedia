{% extends "base.html" %}

{% block content %}
<div class="max-w-6xl">
    <div class="mb-8 border-b border-gray-200 dark:border-gray-700 pb-4">
        <h1 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-white">AI Rewrite Dashboard</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-2">Generate and verify content for approved ideas.</p>
    </div>

    <!-- Batch Generation Controls -->
    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 mb-8 flex justify-between items-center">
        <h2 class="text-lg font-bold text-gray-900 dark:text-white">Batch Controls</h2>
        <div>
            <button hx-post="/batch-generate" hx-target="body" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2.5 rounded-lg font-bold shadow-sm transition-colors">Generate Rewrites</button>
            <span class="text-gray-500 ml-2">for Approved Items</span>
        </div>
    </div>

    <!-- Rewrite Table -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
        <table class="w-full text-left text-sm text-gray-900 dark:text-gray-300">
            <thead class="bg-gray-50 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-700">
                <tr>
                    <th class="p-4 font-semibold uppercase text-xs tracking-wider">Topic & Meta</th>
                    <th class="p-4 font-semibold uppercase text-xs tracking-wider">Content Idea</th>
                    <th class="p-4 font-semibold uppercase text-xs tracking-wider w-48">Platform Status</th>
                    <th class="p-4 font-semibold uppercase text-xs tracking-wider w-32">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                {% for item in items %}
                    {% include 'partials/content_row.html' %}
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
