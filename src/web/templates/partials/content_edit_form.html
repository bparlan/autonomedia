<tr class="bg-gray-800 border-b border-gray-700" id="row-{{ item.id }}">
    <td colspan="4" class="p-6">
        <form hx-post="/save-content-row/{{ item.id }}" hx-target="#row-{{ item.id }}" hx-swap="outerHTML" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-1">
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Topic</label>
                    <input type="text" name="topic" value="{{ item.topic }}" required class="w-full border border-gray-600 p-2 rounded bg-gray-700 text-white text-sm focus:ring-indigo-500">
                </div>
                <div class="md:col-span-1">
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Type</label>
                    <select name="type" required class="w-full border border-gray-600 p-2 rounded bg-gray-700 text-white text-sm focus:ring-indigo-500">
                        <option value="RefLink" {% if item.type == 'RefLink' %}selected{% endif %}>RefLink</option>
                        <option value="SelfPromotion" {% if item.type == 'SelfPromotion' %}selected{% endif %}>SelfPromotion</option>
                        <option value="Social" {% if item.type == 'Social' %}selected{% endif %}>Social</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Link URL</label>
                    <input type="url" name="link_url" value="{{ item.link_url }}" class="w-full border border-gray-600 p-2 rounded bg-gray-700 text-white text-sm focus:ring-indigo-500">
                </div>
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Source Idea</label>
                <textarea name="source_idea" required class="w-full border border-gray-600 p-2 rounded bg-gray-700 text-white text-sm focus:ring-indigo-500 h-24">{{ item.source_idea }}</textarea>
            </div>
            
            <div class="flex flex-col md:flex-row md:items-end justify-between space-y-4 md:space-y-0 md:space-x-4 border-t border-gray-700 pt-4">
                <div class="flex gap-4 flex-1">
                    <div class="flex-1">
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Hashtags (csv)</label>
                        <input type="text" name="hashtags" value="{{ (item.hashtags | fromjson) | join(', ') }}" class="w-full border border-gray-600 p-2 rounded bg-gray-700 text-white text-sm focus:ring-indigo-500">
                    </div>
                </div>
                
                <div class="flex space-x-2">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded font-bold text-sm shadow-sm transition-colors">Save</button>
                    <button type="button" class="bg-gray-700 hover:bg-gray-600 text-gray-200 px-5 py-2 rounded font-bold text-sm shadow-sm transition-colors" hx-get="/cancel-edit-content/{{ item.id }}" hx-target="#row-{{ item.id }}" hx-swap="outerHTML">Cancel</button>
                </div>
            </div>
        </form>
    </td>
</tr>
