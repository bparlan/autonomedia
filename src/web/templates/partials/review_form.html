<tr id="row-{{ item.id }}" class="bg-gray-50">
    <td colspan="7" class="px-6 py-4">
        <form hx-post="/save-review/{{ item.id }}" hx-target="#row-{{ item.id }}" hx-swap="outerHTML">
            <h4 class="font-bold mb-2 text-indigo-700">Review Prepared Content for {{ item.topic }}</h4>
            
            <div class="grid grid-cols-1 gap-4 mb-4">
                {% set prepared = item.prepared_content | fromjson %}
                {% if prepared is mapping %}
                    {% for platform, content in prepared.items() %}
                    <div>
                        <label class="block text-sm font-medium text-gray-700 capitalize">{{ platform }}</label>
                        <textarea name="platform_{{ platform }}" rows="4" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm">{{ content }}</textarea>
                    </div>
                    {% endfor %}
                {% else %}
                    <p class="text-sm text-red-500">Error: Content is not in valid format.</p>
                {% endif %}
            </div>

            <div class="flex space-x-2">
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-bold py-1 px-3 rounded text-sm">
                    Approve & Send to Queue
                </button>
                <button type="button" hx-get="/cancel-edit/{{ item.id }}" hx-target="#row-{{ item.id }}" hx-swap="outerHTML" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-1 px-3 rounded text-sm">
                    Cancel
                </button>
            </div>
        </form>
    </td>
</tr>
