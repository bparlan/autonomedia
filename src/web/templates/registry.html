{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-gray-900 dark:text-white">Entity Registry (Whitelist)</h1>
    <p class="text-gray-600 dark:text-gray-400 mb-6">Manage whitelisted entities and their platform-specific handles.</p>
    
    <form action="/registry/update" method="POST">
        <textarea name="registry_data" rows="20" class="w-full font-mono text-sm border p-4 rounded bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 border-gray-300 dark:border-gray-700">{{ registry | tojson(indent=2) }}</textarea>
        <div class="mt-4">
            <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded font-bold hover:bg-indigo-700">Save Registry</button>
        </div>
    </form>
</div>
{% endblock %}
